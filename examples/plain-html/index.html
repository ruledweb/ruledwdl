<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>@wdl/core — plain HTML example</title>
  <!--
    No build step. The browser resolves bare specifiers (`@wdl/core`, `marked`) via this
    import map — `@wdl/core` points straight at the repo's src/index.js, `marked` (src/markdown.js's
    only dependency) comes from a CDN ESM build. Serve this file over http(s) — file:// is blocked
    by CORS for module imports in most browsers. From the repo root:
      npx serve .          (or) python3 -m http.server
    then open http://localhost:<port>/examples/plain-html/
  -->
  <script type="importmap">
  {
    "imports": {
      "@wdl/core": "../../src/index.js",
      "marked": "https://esm.sh/marked@12.0.2"
    }
  }
  </script>
  <style>
    body { font-family: ui-monospace, monospace; padding: 40px; background: #f4f4f5; }
    iframe { width: 100%; height: 420px; border: 1px solid #d4d4d8; border-radius: 8px; background: #fff; }
  </style>
</head>
<body>
  <h1>@wdl/core rendered client-side</h1>
  <p>composePage() ran entirely in the browser — no server, no build step.</p>

  <!--
    composePage() returns a FULL <!DOCTYPE html> document (via wrapPage), so it's hosted in an
    iframe via srcdoc rather than injected into this page's DOM (which would nest <html>/<head>
    inside a <div>, which browsers don't render correctly).
  -->
  <iframe id="out" title="WDL render output"></iframe>

  <script type="module">
    import { composePage, createMemoryStore } from '@wdl/core';

    // A store is just a plain object of async lookups — createMemoryStore wraps in-memory data
    // in that shape. Any backend (fetch calls to an API, IndexedDB, ...) works the same way.
    const store = createMemoryStore({
      layouts: {
        base: {
          name: 'base',
          COMPONENTS: [{
            emmet: 'div.shell',
            attr: { '.shell': { text: '{{content}}' } },
          }],
          DATA: {
            __design_tokens: ':root{--color-primary:#4f46e5;}',
          },
        },
      },
      components: {
        badge: {
          emmet: 'span.badge',
          attr: { '.badge': { text: '${label}' } },
        },
      },
    });

    const page = {
      title: 'Hello from the browser',
      layout: 'base',
      REGISTRY: {
        shell: { style: 'font-family:system-ui;padding:32px;' },
        badge: { style: 'display:inline-block;background:var(--color-primary);color:#fff;padding:4px 10px;border-radius:999px;font-size:12px;' },
        card:  { style: 'margin-top:12px;' },
      },
      COMPONENTS: [
        { component: 'badge', data_overrides: { label: '@wdl/core' } },
        { emmet: 'div.card>h1+p', attr: {
          h1: { text: 'Hello ${name} 👋' },
          p:  { text: 'This ran with **zero build step** — plain ES modules in the browser.' },
        } },
      ],
      DATA: { name: 'World' },
    };

    const { html } = await composePage(store, 'demo', page);
    document.getElementById('out').srcdoc = html;
  </script>
</body>
</html>
